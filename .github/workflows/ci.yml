name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Placeholder values only — every route is force-dynamic (no build-time DB
  # queries), so the build just needs syntactically valid env vars for
  # Prisma/Auth.js to initialize, never a real connection. No secrets needed.
  DATABASE_URL: "postgresql://user:password@localhost:5432/flexvault_ci?schema=public"
  AUTH_SECRET: "ci-placeholder-secret-not-used-in-prod"
  NEXTAUTH_URL: "http://localhost:3000"
  AUTH_GOOGLE_ID: ""
  AUTH_GOOGLE_SECRET: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
